name: dtu-food-dev
services:
  api:
    container_name: "DtuFood-api"
    build:
      dockerfile: DtuFoodAPI/Dockerfile
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5003
      - ConnectionStrings__Database=host=food-db; port=5431; database=DtuFoodDb; username=dev; password=dev
    depends_on:
      food-db:
        condition: service_healthy
    
  food-db:
    container_name: "dtu-food-db"
    image: postgres:15
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: DtuFoodDb
      PGPORT: 5431
    ports:
      - "5431:5431"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev -d DtuFoodDb" ]
      interval: 5s
      timeout: 5s
      retries: 5